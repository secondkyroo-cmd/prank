<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halaman Polos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      border: 1px solid #ddd;
      background-color: white;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    button:hover {
      background-color: #f5f5f5;
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="pindahBtn">Free diamond</button>
  </div>
  
  <script>
    document.getElementById('pindahBtn').addEventListener('click', function() {
      // Ganti 'halaman2.html' sesuai file tujuan kamu
      window.location.href = 'bani-gembrot.html';
    });
  </script>
</body>
</html>
