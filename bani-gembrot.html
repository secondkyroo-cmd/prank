    filter:contrast(1.15) brightness(0.95);
    animation:slow-zoom 40s ease-in-out infinite alternate;
    z-index:0;
  }
  @keyframes slow-zoom{
    0%{transform:scale(1);}
    100%{transform:scale(1.12);}
  }
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 35%, rgba(0,0,0,0.85) 100%);
  }

  /* ---------- FILM GRAIN ---------- */
  .grain{
    position:fixed; inset:-50px; z-index:2; pointer-events:none;
    opacity:.18; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size:160px 160px;
  }

  /* ---------- RED FLICKER ---------- */
  .red-flicker{
    position:fixed; inset:0; z-index:6; pointer-events:none;
    background:var(--blood-bright); opacity:0; mix-blend-mode:multiply;
  }
  .red-flicker-thick{
    position:fixed; inset:0; z-index:6; pointer-events:none;
    background:var(--blood); opacity:0; mix-blend-mode:hard-light;
  }
  body.shake .bg, body.shake .vignette{
    animation:shake-it .12s linear infinite, slow-zoom 40s ease-in-out infinite alternate;
  }
  @keyframes shake-it{
    0%{transform:translate(0,0) scale(1.0);}
    25%{transform:translate(-6px,3px) scale(1.0);}
    50%{transform:translate(5px,-4px) scale(1.0);}
    75%{transform:translate(-3px,-2px) scale(1.0);}
    100%{transform:translate(4px,2px) scale(1.0);}
  }

  /* ---------- BLOOD ---------- */
  .blood-layer{position:fixed; inset:0; z-index:5; pointer-events:none; overflow:hidden;}
  .blood-top{
    position:absolute; top:0; left:0; width:100%; height:5px;
    background:linear-gradient(to bottom, var(--blood-bright), var(--blood-dark));
    box-shadow:0 0 14px rgba(180,0,0,0.65);
  }
  .drip{
    position:absolute; top:0;
    border-radius:0 0 60% 60%;
    background:linear-gradient(to bottom, var(--blood-bright), var(--blood-dark));
    box-shadow:0 0 6px rgba(120,0,0,.6) inset;
    opacity:.9;
  }
  @keyframes drip-fall{
    0%{height:0; opacity:.95;}
    75%{opacity:.85;}
    100%{height:var(--len); opacity:0;}
  }

  /* ---------- ENTRY GATE ---------- */
  .gate{
    position:fixed; inset:0; z-index:50; background:#000;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:opacity 1.1s ease;
  }
  .gate span{
    font-family:'Nosifer', cursive; color:var(--blood-bright);
    font-size:clamp(20px,5vw,38px); letter-spacing:2px;
    text-shadow:0 0 10px rgba(200,10,10,.85), 0 0 30px rgba(120,0,0,.5);
    animation:pulse-text 1.8s ease-in-out infinite;
    text-align:center; padding:0 20px;
  }
  .gate small{
    display:block; margin-top:14px; font-family:'Special Elite', monospace;
    color:#7a7a7a; font-size:12px; letter-spacing:3px;
  }
  @keyframes pulse-text{
    0%,100%{opacity:.75; text-shadow:0 0 10px rgba(200,10,10,.6);}
    50%{opacity:1; text-shadow:0 0 22px rgba(255,20,20,1), 0 0 50px rgba(200,0,0,.7);}
  }
  .gate.hidden{opacity:0; pointer-events:none;}

  /* ---------- PHOTOS ---------- */
  .photos-container{
    position:fixed; inset:0; z-index:7;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .cluster{position:relative; width:320px; height:380px;}
  .photo{
    position:absolute; width:230px; height:270px;
    background:#0c0b0a; padding:14px 14px 34px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.8);
    opacity:0; will-change:transform, opacity;
  }
  .photo .pic{
    width:100%; height:100%; overflow:hidden;
    clip-path:polygon(0% 2%,3% 0%,97% 1%,100% 4%,99% 97%,96% 100%,2% 99%,0% 96%);
  }
  .photo img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo.p1{left:14px; top:18px; z-index:1; --tilt:-10deg;}
  .photo.p2{left:80px; top:46px; z-index:2; --tilt:7deg;}
  .photo.p3{left:36px; top:96px; z-index:3; --tilt:-4deg;}
  .photo.p1 .pic img{filter:grayscale(.5) contrast(1.4) brightness(.85);}
  .photo.p2 .pic img{filter:invert(.82) hue-rotate(180deg) contrast(1.2);}
  .photo.p3 .pic img{filter:sepia(.4) saturate(2) hue-rotate(-30deg) contrast(1.3) brightness(.8);}
  .photo.p3::after{
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 30% 20%, rgba(140,0,0,.35), transparent 60%);
    pointer-events:none;
  }

  .photos-container.visible .photo{
    animation:photo-pop .65s cubic-bezier(.2,.9,.3,1.1) forwards;
  }
  .photos-container.visible .photo.p1{animation-delay:0s;}
  .photos-container.visible .photo.p2{animation-delay:.14s;}
  .photos-container.visible .photo.p3{animation-delay:.28s;}

  @keyframes photo-pop{
    0%{opacity:0; transform:scale(.35) rotate(0deg) translateY(50px); filter:brightness(3.2) contrast(2);}
    45%{opacity:1; transform:scale(1.1) rotate(var(--tilt)) translateY(-8px); filter:brightness(1.5);}
    65%{transform:scale(.95) rotate(var(--tilt)) translateY(5px); filter:brightness(.9);}
    100%{opacity:1; transform:scale(1) rotate(var(--tilt)) translateY(0); filter:brightness(1) contrast(1.05);}
  }

  .photo.jitter{animation:jitter-it .16s steps(2,end) 2 !important;}
  @keyframes jitter-it{
    0%{transform:translate(0,0) rotate(var(--tilt));}
    25%{transform:translate(-3px,2px) rotate(calc(var(--tilt) - 1.5deg));}
    50%{transform:translate(2px,-2px) rotate(calc(var(--tilt) + 1.5deg));}
    75%{transform:translate(-2px,1px) rotate(var(--tilt));}
    100%{transform:translate(0,0) rotate(var(--tilt));}
  }

  /* ---------- NOTE ---------- */
  .note{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%) rotate(-7deg) scale(2.2);
    width:340px; text-align:center; z-index:9;
    font-family:'Nosifer', cursive; color:var(--blood-bright);
    text-shadow:0 0 10px rgba(220,10,10,.9), 2px 2px 0 #000, -1px -1px 0 #000;
    opacity:0; pointer-events:none;
  }
  .note .line1{font-size:30px; line-height:1.15; display:block;}
  .note .line2{
    display:block; margin-top:10px; font-family:'Special Elite', monospace;
    color:#e23a3a; font-size:13px; letter-spacing:1px; text-shadow:1px 1px 0 #000;
  }
  .note.visible{animation:note-slam .7s ease-out forwards;}
  @keyframes note-slam{
    0%{opacity:0; transform:translate(-50%,-50%) rotate(-7deg) scale(2.4);}
    55%{opacity:1; transform:translate(-50%,-50%) rotate(-7deg) scale(.9);}
    75%{transform:translate(-50%,-50%) rotate(-7deg) scale(1.06);}
    100%{opacity:1; transform:translate(-50%,-50%) rotate(-7deg) scale(1);}
  }

  /* ---------- SOUND TOGGLE ---------- */
  .sound-btn{
    position:fixed; top:16px; right:16px; z-index:60;
    width:38px; height:38px; border-radius:50%;
    background:rgba(10,8,8,.55); border:1px solid rgba(150,20,20,.5);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity .6s ease;
  }
  .sound-btn.show{opacity:1;}
  .sound-btn svg{width:18px; height:18px; stroke:var(--bone); fill:none;}
  .sound-btn:focus-visible{outline:2px solid var(--blood-bright); outline-offset:2px;}

  @media (max-width:480px){
    .cluster{width:260px; height:320px; transform:scale(.85);}
    .note{width:260px;}
    .note .line1{font-size:24px;}
  }
</style>
</head>
<body>

  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="grain"></div>
  <div class="red-flicker" id="redFlicker"></div>
  <div class="red-flicker-thick" id="redFlickerThick"></div>
  <div class="blood-layer" id="bloodLayer"><div class="blood-top"></div></div>

  <div class="photos-container" id="photosContainer">
    <div class="cluster">
      <div class="photo p1"><div class="pic"><img src="https://files.catbox.moe/6yfkn7.jpg">
      <div class="photo p2"><div class="pic"><img src="https://files.catbox.moe/6yfkn7.jpg">
      <div class="photo p3"><div class="pic"><img src="https://files.catbox.moe/6yfkn7.jpg">                                         
      <div class="note" id="noteText">
        <span class="line1">Bani<br>Arasyid</span>
        <span class="line2">— dia sudah lama di sini —</span>
      </div>
    </div>
  </div>

  <button class="sound-btn" id="soundBtn" aria-label="Aktifkan atau matikan suara" type="button">
    <svg id="soundIconOn" viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
      <path d="M4 9v6h4l5 5V4L8 9H4z"/>
      <path d="M16.5 8.5a5 5 0 0 1 0 7"/>
      <path d="M19 6a8 8 0 0 1 0 12"/>
    </svg>
    <svg id="soundIconOff" viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 9v6h4l5 5V4L8 9H4z"/>
      <path d="M16 9l5 6M21 9l-5 6"/>
    </svg>
  </button>

  <audio id="bgmAudio" src="https://files.catbox.moe/bmkx2p.mp3" loop preload="auto"></audio>

  <div class="gate" id="gate" tabindex="0" role="button" aria-label="Klik untuk masuk">
    <div>
      <span>TEKAN UNTUK MASUK</span>
      <small>SUARA AKAN AKTIF</small>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gate = document.getElementById('gate');
  var redFlicker = document.getElementById('redFlicker');
  var redFlickerThick = document.getElementById('redFlickerThick');
  var bloodLayer = document.getElementById('bloodLayer');
  var photosContainer = document.getElementById('photosContainer');
  var noteText = document.getElementById('noteText');
  var soundBtn = document.getElementById('soundBtn');
  var soundIconOn = document.getElementById('soundIconOn');
  var soundIconOff = document.getElementById('soundIconOff');
  var bgmAudio = document.getElementById('bgmAudio');
  var grainEl = document.querySelector('.grain');

  var audioCtx = null;
  var masterGain = null;
  var droneNodes = null;
  var muted = false;
  var entered = false;

  /* ---------- FILM GRAIN FLICKER (cheap, runs always) ---------- */
  if (!reduceMotion){
    setInterval(function(){
      var x = Math.floor(Math.random()*160);
      var y = Math.floor(Math.random()*160);
      grainEl.style.backgroundPosition = x + 'px ' + y + 'px';
    }, 60);
  }

  /* ---------- RED FLICKER (harsh, irregular) ---------- */
  function flickerBurst(forceStrong){
    var hits = 2 + Math.floor(Math.random()*3);
    var t = 0;
    for (var i=0; i<hits; i++){
      var onDelay = t;
      var onOpacity = (forceStrong ? 0.45 : 0.12) + Math.random()*0.35;
      var offDelay = t + 40 + Math.random()*90;
      (function(oD, oO, fD){
        setTimeout(function(){ redFlicker.style.opacity = oO; }, oD);
        setTimeout(function(){ redFlicker.style.opacity = 0; }, fD);
      })(onDelay, onOpacity, offDelay);
      t = offDelay + 30 + Math.random()*70;
    }
    if (forceStrong){
      document.body.classList.add('shake');
      setTimeout(function(){ document.body.classList.remove('shake'); }, t + 150);
    }
  }

  function scheduleFlicker(){
    var delay = 1800 + Math.random()*4200;
    setTimeout(function(){
      if (!reduceMotion) flickerBurst(false);
      scheduleFlicker();
    }, delay);
  }

  /* ---------- THICK RED FLICKER (heavier, blunter, rougher) ---------- */
  function thickFlickerBurst(forceStrong){
    var hits = forceStrong ? (1 + Math.floor(Math.random()*2)) : 1;
    var t = 0;
    for (var i=0; i<hits; i++){
      var onDelay = t;
      var onOpacity = (forceStrong ? 0.6 : 0.32) + Math.random()*0.3;
      var holdDur = (forceStrong ? 140 : 90) + Math.random()*160;
      var offDelay = onDelay + holdDur;
      (function(oD, oO, fD){
        setTimeout(function(){ redFlickerThick.style.opacity = oO; }, oD);
        setTimeout(function(){ redFlickerThick.style.opacity = 0; }, fD);
      })(onDelay, onOpacity, offDelay);
      t = offDelay + 50 + Math.random()*120;
    }
  }

  function scheduleThickFlicker(){
    var delay = 3800 + Math.random()*6500;
    setTimeout(function(){
      if (!reduceMotion) thickFlickerBurst(false);
      scheduleThickFlicker();
    }, delay);
  }

  /* ---------- BLOOD DRIPS ---------- */
  function spawnDrip(){
    var drip = document.createElement('div');
    drip.className = 'drip';
    var left = Math.random()*96;
    var width = 3 + Math.random()*7;
    var len = (30 + Math.random()*60) + 'vh';
    var dur = (3.5 + Math.random()*4).toFixed(2) + 's';
    drip.style.left = left + '%';
    drip.style.width = width + 'px';
    drip.style.setProperty('--len', len);
    drip.style.animation = 'drip-fall ' + dur + ' linear forwards';
    bloodLayer.appendChild(drip);
    drip.addEventListener('animationend', function(){ drip.remove(); });
  }
  function startBlood(){
    spawnDrip();
    setInterval(spawnDrip, reduceMotion ? 2200 : 750 + Math.random()*500);
  }

  /* ---------- SYNTHESIZED AMBIENT DRONE + STINGER (no external file needed) ---------- */
  function ensureAudioCtx(){
    if (!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  function startDrone(){
    var ctx = ensureAudioCtx();

    var osc1 = ctx.createOscillator();
    osc1.type = 'sine';
    osc1.frequency.value = 54;

    var osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = 57.5;

    var droneGain = ctx.createGain();
    droneGain.gain.value = 0.12;

    var lfo = ctx.createOscillator();
    lfo.frequency.value = 0.07;
    var lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.05;
    lfo.connect(lfoGain);
    lfoGain.connect(droneGain.gain);

    osc1.connect(droneGain);
    osc2.connect(droneGain);
    droneGain.connect(masterGain);

    osc1.start(); osc2.start(); lfo.start();

    /* low hiss / noise bed */
    var bufferSize = 2 * ctx.sampleRate;
    var noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var output = noiseBuffer.getChannelData(0);
    for (var i=0; i<bufferSize; i++){ output[i] = (Math.random()*2-1) * 0.6; }
    var noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;

    var noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 380;

    var noiseGain = ctx.createGain();
    noiseGain.gain.value = 0.025;

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(masterGain);
    noise.start();

    droneNodes = {osc1:osc1, osc2:osc2, lfo:lfo, noise:noise};
  }

  function playStinger(){
    var ctx = ensureAudioCtx();
    var now = ctx.currentTime;

    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(45, now + 0.4);

    var g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.5, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);

    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.6);
  }

  /* ---------- SOUND TOGGLE ---------- */
  function setMuted(m){
    muted = m;
    if (masterGain) masterGain.gain.value = m ? 0 : 0.5;
    bgmAudio.muted = m;
    soundIconOn.style.display = m ? 'none' : 'block';
    soundIconOff.style.display = m ? 'block' : 'none';
  }
  soundBtn.addEventListener('click', function(){ setMuted(!muted); });

  /* ---------- ENTRY ---------- */
  function enterSite(){
    if (entered) return;
    entered = true;

    gate.classList.add('hidden');
    setTimeout(function(){ gate.style.display = 'none'; }, 1200);

    var ctx = ensureAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    startDrone();
    bgmAudio.play().catch(function(){ /* user supplies their own mp3 file to enable this track */ });

    soundBtn.classList.add('show');
    setMuted(false);

    startBlood();
    scheduleFlicker();
    scheduleThickFlicker();

    setTimeout(function(){
      photosContainer.classList.add('visible');
      flickerBurst(true);
      thickFlickerBurst(true);

      if (!reduceMotion){
        setInterval(function(){
          var photos = photosContainer.querySelectorAll('.photo');
          var p = photos[Math.floor(Math.random()*photos.length)];
          p.classList.add('jitter');
          setTimeout(function(){ p.classList.remove('jitter'); }, 350);
        }, 2600 + Math.random()*2000);
      }

      setTimeout(function(){
        noteText.classList.add('visible');
        flickerBurst(true);
        thickFlickerBurst(true);
        playStinger();
      }, 950);

    }, 5000);
  }

  gate.addEventListener('click', enterSite);
  gate.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') enterSite();
  });

})();
</script>
</body>
</html>
